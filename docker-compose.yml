services:
  capture:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecoute-capture
    command: ["bash", "/app/scripts/capture_rtsp_audio.sh"]
    env_file:
      - .env
    environment:
      OUTPUT_DIR: /app/audios
      HEARTBEAT_FILE: /app/runtime/capture_heartbeat.json
      CAPTURE_HEARTBEAT_MAX_AGE_SECONDS: ${CAPTURE_HEARTBEAT_MAX_AGE_SECONDS:-180}
      PIPELINE_INTERVAL_SECONDS: ${PIPELINE_INTERVAL_SECONDS:-60}
    volumes:
      - ./audios:/app/audios
      - ./audios_processed:/app/audios_processed
      - ./speech_segments:/app/speech_segments
      - ./transcriptions:/app/transcriptions
      - ./runtime:/app/runtime
    networks:
      - ecoute-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/app/scripts/health_capture.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecoute-pipeline
    command: ["python", "ecoute/pipeline_runner.py", "--loop"]
    env_file:
      - .env
    environment:
      INPUT_AUDIO_DIR: /app/audios
      PROCESSED_AUDIO_DIR: /app/audios_processed
      SPEECH_SEGMENTS_DIR: /app/speech_segments
      TRANSCRIPTIONS_DB_PATH: /app/transcriptions/transcriptions.sqlite
      TRANSCRIPTIONS_JSON_OUTPUT: /app/transcriptions/transcriptions.json
      PIPELINE_INTERVAL_SECONDS: ${PIPELINE_INTERVAL_SECONDS:-60}
      PIPELINE_MAX_BACKOFF_SECONDS: ${PIPELINE_MAX_BACKOFF_SECONDS:-300}
    volumes:
      - ./audios:/app/audios
      - ./audios_processed:/app/audios_processed
      - ./speech_segments:/app/speech_segments
      - ./transcriptions:/app/transcriptions
      - ./runtime:/app/runtime
    networks:
      - ecoute-net
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecoute-ui
    command: ["streamlit", "run", "ui/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    env_file:
      - .env
    environment:
      TRANSCRIPTIONS_DB_PATH: /app/transcriptions/transcriptions.sqlite
      TRANSCRIPTIONS_JSON_OUTPUT: /app/transcriptions/transcriptions.json
    volumes:
      - ./audios:/app/audios
      - ./audios_processed:/app/audios_processed
      - ./speech_segments:/app/speech_segments
      - ./transcriptions:/app/transcriptions
      - ./runtime:/app/runtime
    ports:
      - "8501:8501"
    networks:
      - ecoute-net
    restart: unless-stopped

networks:
  ecoute-net:
    driver: bridge
